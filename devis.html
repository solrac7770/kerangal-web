<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demander un Devis - Restaurant Kerangal</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" style="background: rgba(10, 10, 10, 0.9); position: relative;">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <img src="images/logo.jpg" alt="KERANGAL" class="logo-img">
                <span class="logo">KERANGAL</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index.html#menu">Notre Carte</a></li>
                <li><a href="index.html#privatiser">Privatiser</a></li>
                <li><a href="index.html#reservation" class="nav-cta">Réserver</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Devis Section -->
    <section class="reservation" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header">
                <span class="section-subtitle">Sur Mesure</span>
                <h2 class="section-title">Demander un Devis</h2>
                <div class="section-divider"></div>
            </div>
            <div class="reservation-content">
                <form class="reservation-form" id="devisForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="devis-name">Nom Complet *</label>
                            <input type="text" id="devis-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="devis-email">Email *</label>
                            <input type="email" id="devis-email" name="email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="devis-phone">Téléphone *</label>
                            <input type="tel" id="devis-phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="devis-type">Type d'Événement *</label>
                            <select id="devis-type" name="type" required>
                                <option value="">Sélectionner</option>
                                <option value="mariage">Mariage</option>
                                <option value="corporate">Événement Corporate</option>
                                <option value="anniversaire">Anniversaire</option>
                                <option value="cocktail">Cocktail</option>
                                <option value="autre">Autre</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="devis-date">Date Souhaitée *</label>
                            <input type="date" id="devis-date" name="date" required>
                        </div>
                        <div class="form-group">
                            <label for="devis-guests">Nombre de Personnes (Approx.) *</label>
                            <input type="number" id="devis-guests" name="guests" min="10" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="devis-message">Détails de votre projet</label>
                        <textarea id="devis-message" name="message" rows="4"
                            placeholder="Racontez-nous vos envies..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Envoyer la Demande</button>
                </form>
                <div class="reservation-success" id="devisSuccess">
                    <div class="success-icon">✨</div>
                    <h3>Merci !</h3>
                    <p>Nous avons bien reçu votre demande. Notre équipe vous contactera très prochainement pour
                        organiser votre événement.</p>
                    <a href="index.html" class="btn btn-secondary">Retour à l'Accueil</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Restaurant Kerangal. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
