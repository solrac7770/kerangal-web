<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver un Cours - Restaurant Kerangal</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" style="background: rgba(10, 10, 10, 0.9); position: relative;">
        <div class="container">
            <a href="index.html" class="nav-brand">
                <img src="images/logo.jpg" alt="KERANGAL" class="logo-img">
                <span class="logo">KERANGAL</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index.html#cours">Cours de Cuisine</a></li>
                <li><a href="index.html#reservation" class="nav-cta">Réserver une Table</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Cours Section -->
    <section class="reservation" style="padding-top: 150px; min-height: 100vh;">
        <div class="container">
            <div class="section-header">
                <span class="section-subtitle">Apprendre</span>
                <h2 class="section-title">Réserver un Cours</h2>
                <div class="section-divider"></div>
            </div>
            <div class="reservation-content">
                <form class="reservation-form" id="coursForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cours-name">Nom Complet *</label>
                            <input type="text" id="cours-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="cours-email">Email *</label>
                            <input type="email" id="cours-email" name="email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="cours-phone">Téléphone *</label>
                            <input type="tel" id="cours-phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="cours-participants">Participants *</label>
                            <select id="cours-participants" name="participants" required>
                                <option value="1">1 personne</option>
                                <option value="2">2 personnes</option>
                                <option value="3">3 personnes</option>
                                <option value="4">4 personnes</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="cours-type">Type de Cours *</label>
                        <select id="cours-type" name="type" required>
                            <option value="">Sélectionner un thème</option>
                            <option value="patisserie">Pâtisserie Française</option>
                            <option value="saison">Cuisine de Saison</option>
                            <option value="regional">Plats Régionaux</option>
                            <option value="techniques">Techniques de Chef</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Réserver le Cours</button>
                </form>
                <div class="reservation-success" id="coursSuccess">
                    <div class="success-icon">👨‍🍳</div>
                    <h3>C'est noté !</h3>
                    <p>Merci pour votre inscription. Nous vous contacterons pour confirmer la date et les détails du
                        cours.</p>
                    <a href="index.html" class="btn btn-secondary">Retour à l'Accueil</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Restaurant Kerangal. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
